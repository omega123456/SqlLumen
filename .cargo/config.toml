# Rust integration tests and llvm-cov settings (invoked via pnpm test:rust / test:rust:coverage).
# Run from the repository root.
# Requires cargo-nextest: https://nexte.st/book/installing.html (e.g. cargo install cargo-nextest).

[alias]
# Integration test targets for this crate (src-tauri/tests/*.rs). Edit here when adding a suite.
mysql-client-test-integration = [
  "nextest",
  "run",
  "--manifest-path",
  "src-tauri/Cargo.toml",
  "--features",
  "test-utils",
  "--test",
  "settings_integration",
  "--test",
  "connections_integration",
  "--test",
  "mysql_integration",
  "--test",
  "commands_integration",
  "--test",
  "db_integration",
  "--test",
  "coverage_boost",
]

mysql-client-llvm-cov = [
  "llvm-cov",
  "nextest",
  "--summary-only",
  "--ignore-filename-regex",
  "src-tauri.*src.*credentials\\.rs|src-tauri.*src.*main\\.rs|",
  "--manifest-path",
  "src-tauri/Cargo.toml",
  "--features",
  "test-utils",
  "--test",
  "settings_integration",
  "--test",
  "connections_integration",
  "--test",
  "mysql_integration",
  "--test",
  "commands_integration",
  "--test",
  "db_integration",
  "--test",
  "coverage_boost",
  "--fail-under-lines",
  "90",
  "--fail-under-functions",
  "90",
  "--fail-under-regions",
  "90",
]
