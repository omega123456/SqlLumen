# Rust integration tests and llvm-cov settings (invoked via pnpm test:rust / test:rust:coverage).
# Run from the repository root.

[alias]
mysql-client-test-integration = [
  "test",
  "--quiet",
  "--manifest-path",
  "src-tauri/Cargo.toml",
  "--features",
  "test-utils",
  "--test",
  "settings_integration",
  "--test",
  "connections_integration",
  "--test",
  "mysql_integration",
  "--test",
  "commands_integration",
  "--test",
  "db_integration",
  "--test",
  "coverage_boost",
]

mysql-client-llvm-cov = [
  "llvm-cov",
  "--quiet",
  "--summary-only",
  "test",
  "--manifest-path",
  "src-tauri/Cargo.toml",
  "--features",
  "test-utils",
  "--test",
  "settings_integration",
  "--test",
  "connections_integration",
  "--test",
  "mysql_integration",
  "--test",
  "commands_integration",
  "--test",
  "db_integration",
  "--test",
  "coverage_boost",
  "--fail-under-lines",
  "90",
  "--fail-under-functions",
  "90",
  "--fail-under-regions",
  "90",
]
